version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: America/Denver
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: "10:15"
      timezone: America/Denver
    open-pull-requests-limit: 5
    groups:
      eslint-toolchain:
        patterns:
          - eslint
          - "@eslint/*"
          - "@typescript-eslint/*"
          - typescript-eslint
      frontend-test-tooling:
        patterns:
          - jsdom
          - vitest
          - "@vitest/*"
    ignore:
      - dependency-name: typescript
        versions:
          - ">=7"
      - dependency-name: eslint
        versions:
          - ">=10"
      - dependency-name: "@eslint/js"
        versions:
          - ">=10"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:30"
      timezone: America/Denver
    open-pull-requests-limit: 5
