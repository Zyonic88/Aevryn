name: Aevryn CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  backend:
    name: Backend gates / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install backend dependencies
        run: python -m pip install -e ".[dev,platform,postgresql,object-storage,identity]"

      - name: Ruff
        run: python -m ruff check .

      - name: Mypy
        run: python -m mypy src tests

      - name: Pytest
        run: |
          mkdir -p .local
          python -m pytest --basetemp=.local/pytest-tmp -q

  frontend:
    name: Frontend gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: ESLint
        working-directory: web
        run: npm run lint

      - name: Vitest
        working-directory: web
        run: npm test -- --reporter=dot

      - name: Build
        working-directory: web
        run: npm run build
