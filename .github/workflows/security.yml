name: Aevryn Security

on:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "17 10 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repository-secret-scan:
    name: Repository secret scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install scanner dependencies
        run: python -m pip install -e .

      - name: Secret scan
        run: python -m aevryn.security.secret_scan

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python audit dependencies
        run: python -m pip install -e ".[dev,platform,postgresql,object-storage,identity]" pip-audit

      - name: Python dependency audit
        run: pip-audit

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Frontend dependency audit
        working-directory: web
        run: npm audit --audit-level=high

  static-security-scan:
    name: Static security scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Bandit
        run: python -m pip install bandit

      - name: Bandit
        run: python -m bandit -r src -q -s B105
